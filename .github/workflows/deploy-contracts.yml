name: Deploy Contracts

# Push to a network branch triggers deploy or upgrade for that network.
# NEVER push contracts directly to main — main is CI only (build + test).
#
# Deploy branches  (fresh deploy — all contracts):
#   eth-sepolia | eth-mainnet | lisk-sepolia | lisk-mainnet
#
# Upgrade branches (upgrade proxy implementations only):
#   eth-sepolia-upgrade | eth-mainnet-upgrade | lisk-sepolia-upgrade | lisk-mainnet-upgrade
#
# Transfer ownership: workflow_dispatch only (requires new_owner address input).

on:
  push:
    branches:
      - eth-sepolia
      - eth-mainnet
      - lisk-sepolia
      - lisk-mainnet
      - eth-sepolia-upgrade
      - eth-mainnet-upgrade
      - lisk-sepolia-upgrade
      - lisk-mainnet-upgrade

  # transfer-ownership only — requires new_owner address
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        type: choice
        options:
          - eth-sepolia
          - eth-mainnet
          - lisk-sepolia
          - lisk-mainnet
      new_owner:
        description: 'New owner address'
        required: true
        type: string

env:
  FOUNDRY_PROFILE: default

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Require manual approval for any mainnet branch
    environment: ${{ (contains(github.ref_name, 'mainnet') || (github.event_name == 'workflow_dispatch' && contains(inputs.network, 'mainnet'))) && 'mainnet-deploy' || 'testnet-deploy' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      # ── Resolve ACTION and NETWORK from branch name or dispatch ───────────
      - name: Resolve action and network
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=transfer-ownership" >> $GITHUB_OUTPUT
            echo "network=${{ inputs.network }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == *-upgrade ]]; then
            echo "action=upgrade" >> $GITHUB_OUTPUT
            NETWORK="${{ github.ref_name }}"
            echo "network=${NETWORK%-upgrade}" >> $GITHUB_OUTPUT
          else
            echo "action=deploy" >> $GITHUB_OUTPUT
            echo "network=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      # ── Resolve RPC, chain ID, and verifier per network ───────────────────
      - name: Set network config
        id: net
        run: |
          NETWORK="${{ steps.ctx.outputs.network }}"
          if [ "$NETWORK" = "lisk-mainnet" ]; then
            echo "rpc_url=${{ secrets.LISK_MAINNET_RPC_URL }}" >> $GITHUB_OUTPUT
            echo "chain_id=1135" >> $GITHUB_OUTPUT
            echo "verifier=--verifier blockscout --verifier-url https://blockscout.lisk.com/api" >> $GITHUB_OUTPUT
          elif [ "$NETWORK" = "lisk-sepolia" ]; then
            echo "rpc_url=${{ secrets.LISK_SEPOLIA_RPC_URL }}" >> $GITHUB_OUTPUT
            echo "chain_id=4202" >> $GITHUB_OUTPUT
            echo "verifier=--verifier blockscout --verifier-url https://sepolia-blockscout.lisk.com/api" >> $GITHUB_OUTPUT
          elif [ "$NETWORK" = "eth-mainnet" ]; then
            echo "rpc_url=${{ secrets.ETH_MAINNET_RPC_URL }}" >> $GITHUB_OUTPUT
            echo "chain_id=1" >> $GITHUB_OUTPUT
            echo "verifier=--verify" >> $GITHUB_OUTPUT
          else
            echo "rpc_url=https://ethereum-sepolia-rpc.publicnode.com" >> $GITHUB_OUTPUT
            echo "chain_id=11155111" >> $GITHUB_OUTPUT
            echo "verifier=--verify" >> $GITHUB_OUTPUT
          fi

      # ── Normalize private key (ensure 0x prefix) ──────────────────────────
      - name: Normalize private key
        id: pk
        run: |
          PK="${{ secrets.DEPLOYER_PRIVATE_KEY }}"
          [[ "$PK" != 0x* ]] && PK="0x$PK"
          echo "key=$PK" >> $GITHUB_OUTPUT

      - name: Print deployer info
        run: |
          echo "Action:   ${{ steps.ctx.outputs.action }}"
          echo "Network:  ${{ steps.ctx.outputs.network }}"
          echo "Chain ID: ${{ steps.net.outputs.chain_id }}"
          echo "Deployer: $(cast wallet address --private-key '${{ steps.pk.outputs.key }}')"

      - name: Build contracts
        run: forge build --sizes

      - name: Run tests
        run: forge test -vvv

      # ── Prepare deployments dir (vm.writeJson requires it) ────────────────
      - name: Prepare deployments directory
        if: steps.ctx.outputs.action != 'transfer-ownership'
        run: |
          mkdir -p deployments
          [ -f "deployments/${{ steps.ctx.outputs.network }}.json" ] || echo '{}' > "deployments/${{ steps.ctx.outputs.network }}.json"

      # ── Deploy all contracts (fresh) ───────────────────────────────────────
      - name: Deploy all contracts
        if: steps.ctx.outputs.action == 'deploy'
        env:
          PRIVATE_KEY: ${{ steps.pk.outputs.key }}
          NETWORK_NAME: ${{ steps.ctx.outputs.network }}
        run: |
          forge script scripts/QuikDBDeployment.sol:QuikDBDeployment \
            --rpc-url ${{ steps.net.outputs.rpc_url }} \
            --broadcast \
            ${{ steps.net.outputs.verifier }} \
            -vvv

      # ── Upgrade proxy implementations ──────────────────────────────────────
      - name: Upgrade proxy implementations
        if: steps.ctx.outputs.action == 'upgrade'
        env:
          PRIVATE_KEY: ${{ steps.pk.outputs.key }}
          NETWORK_NAME: ${{ steps.ctx.outputs.network }}
        run: |
          forge script scripts/UpgradeV2.s.sol:UpgradeV2 \
            --rpc-url ${{ steps.net.outputs.rpc_url }} \
            --broadcast \
            ${{ steps.net.outputs.verifier }} \
            -vvv

      # ── Transfer ownership (workflow_dispatch only) ────────────────────────
      - name: Transfer ownership
        if: steps.ctx.outputs.action == 'transfer-ownership'
        env:
          PRIVATE_KEY: ${{ steps.pk.outputs.key }}
          NEW_OWNER: ${{ inputs.new_owner }}
        run: |
          if [ -z "$NEW_OWNER" ]; then
            echo "ERROR: new_owner is required"
            exit 1
          fi

          QUIKS_TOKEN=$(jq -r '.QuiksToken' deployments/${{ steps.ctx.outputs.network }}.json)
          REGISTRY=$(jq -r '.UserNodeRegistry' deployments/${{ steps.ctx.outputs.network }}.json)
          STAKING=$(jq -r '.QuiksStaking' deployments/${{ steps.ctx.outputs.network }}.json)

          echo "Transferring QuiksToken ($QUIKS_TOKEN) ownership to $NEW_OWNER"
          cast send $QUIKS_TOKEN \
            "transferOwnership(address)" $NEW_OWNER \
            --rpc-url ${{ steps.net.outputs.rpc_url }} \
            --private-key "$PRIVATE_KEY"

          echo "Transferring UserNodeRegistry ($REGISTRY) ownership to $NEW_OWNER"
          cast send $REGISTRY \
            "transferOwnership(address)" $NEW_OWNER \
            --rpc-url ${{ steps.net.outputs.rpc_url }} \
            --private-key "$PRIVATE_KEY"

          echo "Transferring QuiksStaking ($STAKING) ownership to $NEW_OWNER"
          cast send $STAKING \
            "transferOwnership(address)" $NEW_OWNER \
            --rpc-url ${{ steps.net.outputs.rpc_url }} \
            --private-key "$PRIVATE_KEY"

          echo "Ownership transferred for all 3 contracts. Update DEPLOYER_PRIVATE_KEY secret to the new wallet key."

      # ── Push addresses to MongoDB via device-api webhook ──────────────────
      - name: Push deployment addresses to database
        if: steps.ctx.outputs.action != 'transfer-ownership'
        run: |
          DEPLOYMENT_FILE="deployments/${{ steps.ctx.outputs.network }}.json"

          if [ ! -f "$DEPLOYMENT_FILE" ]; then
            echo "ERROR: deployment file not found: $DEPLOYMENT_FILE"
            exit 1
          fi

          ADDRESSES=$(cat "$DEPLOYMENT_FILE")
          DEPLOYER=$(echo "$ADDRESSES" | jq -r '.deployer // empty')

          PAYLOAD=$(jq -n \
            --arg network "${{ steps.ctx.outputs.network }}" \
            --argjson chainId ${{ steps.net.outputs.chain_id }} \
            --argjson addresses "$ADDRESSES" \
            --arg version "3.0.0" \
            --arg deployer "$DEPLOYER" \
            --arg triggeredBy "${{ github.actor }}" \
            --arg runId "${{ github.run_id }}" \
            --arg deployedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              network: $network,
              chainId: $chainId,
              addresses: $addresses,
              version: $version,
              deployer: $deployer,
              triggeredBy: $triggeredBy,
              runId: $runId,
              deployedAt: $deployedAt
            }')

          HTTP_STATUS=$(curl -s -o /tmp/webhook_response.json -w "%{http_code}" \
            -X POST "${{ secrets.DEVICE_API_URL }}/api/v1/internal/contract-deployments" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}" \
            -d "$PAYLOAD")

          echo "Webhook response (HTTP $HTTP_STATUS):"
          cat /tmp/webhook_response.json

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: webhook returned HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "Contract addresses stored in MongoDB successfully."
